<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhilixMate Contact Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #09090b; /* Deep dark background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contact Card Container */
        .contact-card {
            background-color: #121214;
            border: 1px solid #232326;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Header Text */
        .contact-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .contact-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .contact-header p {
            color: #8e8e93; /* Subtle grey text */
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #d1d1d6;
        }

        input, textarea {
            width: 100%;
            background-color: #1c1c1f;
            border: 1px solid #2c2c30;
            color: #ffffff;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder, textarea::placeholder {
            color: #5c5c60;
        }

        input:focus, textarea:focus {
            border-color: #f7314d; /* Theme accent color on focus */
            background-color: #232326;
        }

        textarea {
            resize: vertical;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #fb2b49 0%, #f73167 100%);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 30px; /* Pill shape matching screenshots */
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 43, 73, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Success Message */
        .form-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background-color: #1a2a1a;
            border: 1px solid #2a4a2a;
            color: #4ade80;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .contact-card {
                padding: 30px 20px;
            }
            
            .contact-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="contact-header">
            <h2>Get in Touch</h2>
            <p>Have a question or need help? Send us a message. Don't provide sensitive information here.</p>
        </div>
        
       <form id="philixContactForm" action="https://formspree.io/f/xbdverve" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label for="query">Query</label>
                <textarea id="query" name="query" placeholder="How can we help you?" rows="5" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
            
            <div id="formMessage" class="form-message hidden">
                Message sent successfully! We will get back to you soon.
            </div>
        </form>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('philixContactForm');
        const messageDiv = document.getElementById('formMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevents the default page reload

            const submitBtn = form.querySelector('.submit-btn');
            const originalBtnText = submitBtn.textContent;
            
            // UI Update: Show sending state
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;

            // Gather form data
            const formData = new FormData(form);

            try {
                // Send data to Formspree
                const response = await fetch(form.action, {
                    method: form.method,
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // Show success message
                    messageDiv.textContent = "Message sent successfully! We will get back to you soon.";
                    messageDiv.style.color = "#4ade80"; // Green text
                    messageDiv.classList.remove('hidden');
                    
                    form.reset(); // Clear the form
                } else {
                    // Handle Formspree specific errors
                    const data = await response.json();
                    if (Object.hasOwn(data, 'errors')) {
                        messageDiv.textContent = data.errors.map(error => error.message).join(", ");
                    } else {
                        messageDiv.textContent = "Oops! There was a problem submitting your form.";
                    }
                    messageDiv.style.color = "#fb2b49"; // Red text for errors
                    messageDiv.classList.remove('hidden');
                }
            } catch (error) {
                // Handle network errors
                messageDiv.textContent = "Oops! There was a network problem.";
                messageDiv.style.color = "#fb2b49";
                messageDiv.classList.remove('hidden');
            } finally {
                // Reset button state
                submitBtn.textContent = originalBtnText;
                submitBtn.disabled = false;

                // Hide message after 5 seconds
                setTimeout(() => {
                    messageDiv.classList.add('hidden');
                }, 5000);
            }
        });
    });
</script>
</body>
</html>
